<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Kitbash POC</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
  #answer { white-space: pre-wrap; border: 1px solid #ccc; padding: 1rem; min-height: 4rem; margin: 1rem 0; border-radius: 6px; }
  #meta { color: #666; font-size: 0.85rem; min-height: 1.2rem; }
  .badge { padding: 1px 7px; border-radius: 10px; font-size: 0.78rem; margin-left: 4px; }
  .badge.mamba { background: #1b5e20; color: #c8f7c5; }
  .badge.off { background: #444; color: #bbb; }
  textarea { width: 100%; height: 3rem; padding: 0.5rem; font: inherit; }
  button { padding: 0.5rem 1rem; font: inherit; cursor: pointer; }
  #ops { display: none; background: #111; color: #0f0; font-family: monospace; font-size: 0.75rem; padding: 1rem; height: 220px; overflow: auto; white-space: pre; border-radius: 6px; margin-top: 1rem; }
  #chat-history { border: 1px solid #ddd; max-height: 400px; overflow-y: auto; padding: 1rem; margin: 1rem 0; border-radius: 6px; background: #f9f9f9; }
  .message { margin-bottom: 1rem; padding: 0.5rem; border-left: 3px solid #ccc; padding-left: 0.75rem; }
  .message-user { border-left-color: #2196F3; background: #e3f2fd; }
  .message-assistant { border-left-color: #4CAF50; background: #f1f8f4; }
  #trace { display: none; background: #1a1a1a; color: #00ff00; font-family: monospace; font-size: 0.75rem; padding: 1rem; height: 400px; overflow-y: auto; border-radius: 6px; margin-top: 1rem; white-space: pre-wrap; }
  .trace-event { margin-bottom: 1rem; border-left: 3px solid #00ff00; padding-left: 0.5rem; }
  .trace-header { cursor: pointer; padding: 0.5rem; background: #222; font-weight: bold; user-select: none; }
  .trace-header:hover { background: #333; }
  .trace-step { color: #00ff00; }
  .trace-duration { color: #ffaa00; margin-left: 1rem; font-size: 0.9rem; }
  .trace-body { display: block; padding: 0.5rem; background: #111; max-height: 300px; overflow-y: auto; }
  .trace-event.collapsed .trace-body { display: none; }
  .row { display: flex; gap: 0.5rem; }
</style>
</head>
<body>
  <h2>Kitbash — chat POC</h2>
  <div id="chat-history"></div>
  <div class="row">
    <textarea id="q" placeholder="Ask something...">What is entropy?</textarea>
  </div>
  <div class="row">
    <button id="send">Send</button>
    <button id="opsbtn" type="button">Toggle OPS stream</button>
  </div>
  <div id="answer"></div>
  <div id="meta"></div>
  <pre id="ops"></pre>
  <button id="tracebtn" type="button">Toggle Debug Trace</button>
  <pre id="trace"></pre>

<script>
const answer = document.getElementById('answer');
const meta = document.getElementById('meta');
const ops = document.getElementById('ops');
const q = document.getElementById('q');
const chatHistory = document.getElementById('chat-history');
const traceEl = document.getElementById('trace');

// --- Part 1: in-session chat history (in-memory, lost on refresh) ---
const messageBuffer = [];
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function addMessage(role, content, metadata = null) {
  messageBuffer.push({ role, content, timestamp: Date.now(), metadata });
  renderChatHistory();
}
function renderChatHistory() {
  chatHistory.innerHTML = '';
  for (const msg of messageBuffer) {
    const div = document.createElement('div');
    div.className = `message message-${msg.role}`;
    if (msg.role === 'user') {
      div.textContent = msg.content;
    } else {
      div.innerHTML = `<strong>Response:</strong> ${escapeHtml(msg.content)}`;
      if (msg.metadata) div.innerHTML += `<br/><small>${msg.metadata}</small>`;
    }
    chatHistory.appendChild(div);
  }
  chatHistory.scrollTop = chatHistory.scrollHeight;
}

// --- Part 2: execution trace visibility ---
let currentTrace = [];
function displayTrace() {
  const html = currentTrace.map(ev => `
    <div class="trace-event">
      <div class="trace-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="trace-step">${escapeHtml(ev.step_name)}</span>
        <span class="trace-duration">${ev.duration_ms}ms</span>
      </div>
      <div class="trace-body"><pre>${escapeHtml(JSON.stringify(ev, null, 2))}</pre></div>
    </div>`).join('');
  traceEl.innerHTML = html || '<small>(no trace captured)</small>';
}

document.getElementById('tracebtn').onclick = () => {
  const show = traceEl.style.display !== 'block';
  traceEl.style.display = show ? 'block' : 'none';
  if (show) displayTrace();
};

document.getElementById('opsbtn').onclick = async () => {
  ops.style.display = ops.style.display === 'block' ? 'none' : 'block';
  if (ops.style.display === 'block') refreshOps();
};

async function refreshOps() {
  try {
    const r = await fetch('/ops');
    ops.textContent = await r.text();
    ops.scrollTop = ops.scrollHeight;
  } catch (e) { /* ignore */ }
}

async function send() {
  const text = q.value.trim();
  if (!text) return;
  answer.textContent = '';
  meta.textContent = 'thinking...';
  document.getElementById('send').disabled = true;
  currentTrace = [];          // reset trace for this query
  addMessage('user', text);   // show user turn immediately

  try {
    const resp = await fetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: text }),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let done_meta = false;
    let fullAnswer = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let nl;
      while ((nl = buf.indexOf('\n')) >= 0) {
        const line = buf.slice(0, nl).trim();
        buf = buf.slice(nl + 1);
        if (!line) continue;
        let obj;
        try { obj = JSON.parse(line); } catch { continue; }
        if (obj.type === 'answer_chunk') {
          answer.textContent += obj.text + ' ';
          fullAnswer += obj.text + ' ';
        } else if (obj.type === 'trace_event') {
          currentTrace.push(obj);          // capture for the trace pane
          if (traceEl.style.display === 'block') displayTrace();
        } else if (obj.type === 'answer_done') {
          const mamba = obj.mamba_injected
            ? '<span class="badge mamba">✓ BitMamba context injected</span>'
            : '<span class="badge off">BitMamba: off / empty</span>';
          const metaHtml = `engine=<b>${obj.engine}</b> &nbsp; confidence=${obj.confidence} &nbsp; latency=${obj.total_latency_ms}ms &nbsp; ${mamba}`;
          meta.innerHTML = metaHtml;
          addMessage('assistant', fullAnswer.trim(), metaHtml);  // history
          done_meta = true;
        } else if (obj.type === 'error') {
          answer.textContent += `\n[error] ${obj.message}`;
        }
      }
    }
    if (!done_meta) meta.textContent = 'done';
    if (ops.style.display === 'block') refreshOps();
  } catch (e) {
    answer.textContent = 'request failed: ' + e;
  } finally {
    document.getElementById('send').disabled = false;
  }
}

document.getElementById('send').onclick = send;
q.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
</script>
</body>
</html>
